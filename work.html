<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Our Work – Video Editing Agency</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0b0b0b;
      color: #fff;
    }

    .navbar {
      background-color: #000;
      padding: 1rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
    }

    .navbar a {
      color: #00ffff;
      text-decoration: none;
      font-weight: bold;
      transition: color 0.3s ease;
    }

    .navbar a:hover {
      color: #00cccc;
    }

    header {
      background: #0f0f0f;
      padding: 2rem 1rem;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,255,255,0.1);
    }

    header h1 {
      font-size: 2.5rem;
      margin: 0;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff;
    }

    .filter-buttons {
      text-align: center;
      margin: 2rem 0;
    }

    .filter-buttons button {
      background: #00ffff;
      color: #000;
      border: none;
      padding: 0.7rem 1.5rem;
      margin: 0 1rem;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 0 0 10px #00ffff;
      transition: background 0.3s ease;
    }

    .filter-buttons button:hover {
      background: #00cccc;
    }

    .category {
      max-width: 1000px;
      margin: 3rem auto;
      padding: 0 1rem;
    }

    .category h2 {
      color: #00ffff;
      margin-bottom: 1rem;
      text-shadow: 0 0 8px #00ffff;
    }

    .video-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }

    .video-card {
      background: #111;
      border-radius: 10px;
      padding: 1rem;
      width: 250px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .video-card h3 {
      text-align: center;
      margin-top: 0.5rem;
      color: #00ffff;
    }

    .video-card video,
    .video-card iframe {
      width: 100%;
      border-radius: 8px;
    }

    .video-916 {
      position: relative;
      width: 100%;
      padding-top: 177.78%; /* 9:16 ratio */
    }

    .video-916 iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
  </nav>

  <header>
    <h1>Our Work</h1>
  </header>

  <div class="filter-buttons">
    <button onclick="toggleView('long')">Long Form</button>
    <button onclick="toggleView('short')">Short Form</button>
  </div>

  <!-- Long Form Videos -->
  <div id="longForm">
    <div class="category">
      <h2>Professional</h2>
      <div class="video-row">
        <div class="video-card"><video src="videos/long_pro_1.mp4" controls></video><h3>Corporate Ad</h3></div>
        <div class="video-card"><video src="videos/long_pro_2.mp4" controls></video><h3>Event Recap</h3></div>
      </div>
    </div>

    <div class="category">
      <h2>Minimal</h2>
      <div class="video-row">
        <div class="video-card"><video src="videos/long_min_1.mp4" controls></video><h3>Interview</h3></div>
        <div class="video-card"><video src="videos/long_min_2.mp4" controls></video><h3>Clean Cut</h3></div>
      </div>
    </div>

    <div class="category">
      <h2>Motion Graphics</h2>
      <div class="video-row">
        <div class="video-card"><video src="videos/long_mg_1.mp4" controls></video><h3>Explainer</h3></div>
        <div class="video-card"><video src="videos/long_mg_2.mp4" controls></video><h3>Stats Reveal</h3></div>
      </div>
    </div>
  </div>

  <!-- Short Form Videos -->
  <div id="shortForm" class="hidden">
    <div class="category">
      <h2>Flashy</h2>
      <div class="video-row">
        <div class="video-card">
          <div class="video-916">
            <iframe src="https://www.youtube.com/embed/q6wru08KIn4" allowfullscreen></iframe>
          </div>
          <h3>Basic Edit</h3>
        </div>
        <div class="video-card"><video src="videos/short_flash_2.mp4" controls></video><h3>Quick Montage</h3></div>
      </div>
    </div>

    <div class="category">
      <h2>Simple</h2>
      <div class="video-row">
        <div class="video-card">
          <div class="video-916">
            <iframe src="https://www.youtube.com/embed/q6wru08KIn4" allowfullscreen></iframe>
          </div>
          <h3>Reel Demo</h3>
        </div>
        <div class="video-card"><video src="videos/short_simple_2.mp4" controls></video><h3>Product Showcase</h3></div>
      </div>
    </div>

    <div class="category">
      <h2>Professional</h2>
      <div class="video-row">
        <div class="video-card"><video src="videos/short_pro_1.mp4" controls></video><h3>Promo Snip</h3></div>
        <div class="video-card"><video src="videos/short_pro_2.mp4" controls></video><h3>Clean Cut</h3></div>
      </div>
    </div>
  </div>

  <script>
    function toggleView(type) {
      document.getElementById("longForm").classList.toggle("hidden", type !== "long");
      document.getElementById("shortForm").classList.toggle("hidden", type !== "short");
    }
  </script>

</body>
</html>
