<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Showcase</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0b0b0b;
      color: #fff;
    }

    header {
      text-align: center;
      padding: 2rem;
      background: #0f0f0f;
    }

    .filter-buttons {
      text-align: center;
      margin: 2rem 0;
    }

    .filter-buttons button {
      background: #00ffff;
      color: #000;
      border: none;
      padding: 0.7rem 1.5rem;
      margin: 0 1rem;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
    }

    .category {
      max-width: 1000px;
      margin: 3rem auto;
    }

    .category h2 {
      color: #00ffff;
      margin-bottom: 1rem;
    }

    .video-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem;
      justify-content: center;
    }

    .video-card {
      background: #111;
      border-radius: 10px;
      padding: 1rem;
      width: 280px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
    }

    .video-card h3 {
      text-align: center;
      margin-top: 0.5rem;
      color: #00ffff;
    }

    /* Standard 16:9 video */
    .video-card video {
      width: 100%;
      border-radius: 8px;
    }

    /* 9:16 YouTube shorts styling */
    .video-916 {
      position: relative;
      width: 100%;
      padding-top: 177.78%; /* 9:16 aspect ratio */
      border-radius: 10px;
      overflow: hidden;
    }

    .video-916 iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Our Work</h1>
  </header>

  <div class="filter-buttons">
    <button onclick="toggleView('long')">Long Form</button>
    <button onclick="toggleView('short')">Short Form</button>
  </div>

  <!-- Long Form Videos -->
  <div id="longForm">
    <div class="category"><h2>Professional</h2>
      <div class="video-row">
        <div class="video-card"><video src="videos/long_pro_1.mp4" controls></video><h3>Corporate Ad</h3></div>
        <div class="video-card"><video src="videos/long_pro_2.mp4" controls></video><h3>Event Recap</h3></div>
      </div>
    </div>
  </div>

  <!-- Short Form Videos -->
  <div id="shortForm" class="hidden">
    <div class="category"><h2>Flashy</h2>
      <div class="video-row">
        <div class="video-card">
          <div class="video-916">
            <iframe src="https://www.youtube.com/embed/q6wru08KIn4" title="Short" allowfullscreen></iframe>
          </div>
          <h3>Basic Edit</h3>
        </div>
        <div class="video-card"><video src="videos/short_flash_2.mp4" controls></video><h3>Quick Montage</h3></div>
      </div>
    </div>

    <div class="category"><h2>Simple</h2>
      <div class="video-row">
        <div class="video-card">
          <div class="video-916">
            <iframe src="https://www.youtube.com/embed/q6wru08KIn4" title="Simple" allowfullscreen></iframe>
          </div>
          <h3>Simple YouTube</h3>
        </div>
        <div class="video-card"><video src="videos/short_simple_2.mp4" controls></video><h3>Product Showcase</h3></div>
      </div>
    </div>
  </div>

  <script>
    function toggleView(type) {
      document.getElementById("longForm").classList.toggle("hidden", type !== "long");
      document.getElementById("shortForm").classList.toggle("hidden", type !== "short");
    }
  </script>

</body>
</html>
